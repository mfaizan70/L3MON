<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L3MON - System Monitor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #667eea;
            border-radius: 2px;
        }
        
        .stat {
            margin-bottom: 15px;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }
        
        .status-ok { color: #10b981; }
        .status-warning { color: #f59e0b; }
        .status-critical { color: #ef4444; }
        
        .alerts-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .alert-item {
            padding: 15px;
            border-left: 4px solid #ef4444;
            background: #fef2f2;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        
        .alert-item.warning {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }
        
        .alert-item.info {
            border-left-color: #3b82f6;
            background: #eff6ff;
        }
        
        .alert-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .alert-time {
            font-size: 0.85em;
            color: #666;
        }
        
        .error {
            color: #ef4444;
            text-align: center;
            padding: 20px;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }
        
        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖥️ L3MON Dashboard</h1>
            <p>Real-time System & Network Monitoring</p>
        </div>
        
        <div class="controls">
            <button class="refresh-btn" onclick="refreshData()">🔄 Refresh Now</button>
        </div>
        
        <div id="content">
            <div class="loading">Loading system data...</div>
        </div>
    </div>

    <script>
        let token = null;

        // Initialize
        window.addEventListener('load', () => {
            login();
        });

        async function login() {
            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'password' })
                });

                const data = await response.json();
                token = data.token;
                
                if (token) {
                    refreshData();
                    // Auto-refresh every 5 seconds
                    setInterval(refreshData, 5000);
                } else {
                    document.getElementById('content').innerHTML = '<div class="error">❌ Login failed</div>';
                }
            } catch (error) {
                document.getElementById('content').innerHTML = '<div class="error">❌ Connection error</div>';
            }
        }

        async function refreshData() {
            try {
                const [serverStats, networkStats, alerts] = await Promise.all([
                    fetch('http://localhost:3000/api/stats/server/current', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }).then(r => r.json()),
                    
                    fetch('http://localhost:3000/api/stats/network/current', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }).then(r => r.json()),
                    
                    fetch('http://localhost:3000/api/alerts/active', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }).then(r => r.json())
                ]);

                renderDashboard(serverStats, networkStats, alerts);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderDashboard(server, network, alerts) {
            const cpuStatus = server.cpu > 80 ? 'critical' : server.cpu > 60 ? 'warning' : 'ok';
            const memStatus = server.memory > 85 ? 'critical' : server.memory > 70 ? 'warning' : 'ok';
            const diskStatus = server.disk > 90 ? 'critical' : server.disk > 80 ? 'warning' : 'ok';

            let html = `
                <div class="dashboard">
                    <div class="card">
                        <div class="card-title">💻 CPU Usage</div>
                        <div class="stat">
                            <div class="stat-value status-${cpuStatus}">${server.cpu.toFixed(1)}%</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${server.cpu}%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">🧠 Memory Usage</div>
                        <div class="stat">
                            <div class="stat-value status-${memStatus}">${server.memory.toFixed(1)}%</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${server.memory}%"></div>
                            </div>
                        </div>
                        <div class="stat-label">${(server.memoryUsed / 1024).toFixed(1)}GB / ${(server.memoryTotal / 1024).toFixed(1)}GB</div>
                    </div>

                    <div class="card">
                        <div class="card-title">💾 Disk Usage</div>
                        <div class="stat">
                            <div class="stat-value status-${diskStatus}">${server.disk.toFixed(1)}%</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${server.disk}%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">⏱️ System Uptime</div>
                        <div class="stat">
                            <div class="stat-value">${formatUptime(server.uptime)}</div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">📊 Load Average</div>
                        <div class="stat">
                            <div class="stat-label">1 min: ${server.loadAverage[0].toFixed(2)}</div>
                            <div class="stat-label">5 min: ${server.loadAverage[1].toFixed(2)}</div>
                            <div class="stat-label">15 min: ${server.loadAverage[2].toFixed(2)}</div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">🔄 Network</div>
                        <div class="stat">
                            <div class="stat-label">Download: ${(network.totalDownload / 1024 / 1024).toFixed(2)} MB/s</div>
                            <div class="stat-label">Upload: ${(network.totalUpload / 1024 / 1024).toFixed(2)} MB/s</div>
                        </div>
                    </div>
                </div>
            `;

            if (alerts.length > 0) {
                html += '<div class="alerts-section"><div class="card-title">🚨 Active Alerts</div>';
                alerts.forEach(alert => {
                    const alertClass = alert.severity === 'critical' ? '' : alert.severity === 'warning' ? 'warning' : 'info';
                    html += `
                        <div class="alert-item ${alertClass}">
                            <div class="alert-title">${alert.type.toUpperCase()}: ${alert.message}</div>
                            <div class="alert-time">Value: ${alert.value.toFixed(2)}% (Threshold: ${alert.threshold}%)</div>
                        </div>
                    `;
                });
                html += '</div>';
            }

            document.getElementById('content').innerHTML = html;
        }

        function formatUptime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            return `${days}d ${hours}h ${minutes}m`;
        }
    </script>
</body>
</html>
